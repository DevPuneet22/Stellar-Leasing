services:
  postgres:
    image: postgres:17
    container_name: stellar-leasing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stellarleasing}
      POSTGRES_USER: ${POSTGRES_USER:-stellar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stellar_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stellar} -d ${POSTGRES_DB:-stellarleasing}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
